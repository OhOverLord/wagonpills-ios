# SwiftLint configuration for WagonPills iOS

# Rules disabled by default — re-enable selectively below
disabled_rules:
  - trailing_comma          # personal preference, comma after last element is fine
  - todo                    # TODO/FIXME allowed during early development

# Rules NOT enabled by default — turn them on
opt_in_rules:
  - force_unwrapping        # ban `!` on optionals
  - empty_count             # use isEmpty instead of count == 0
  - closure_spacing
  - first_where             # use .first(where:) instead of .filter().first
  - sorted_imports
  - prefer_self_type_over_type_of_self
  - convenience_type
  - explicit_init
  - empty_string

# Rule customizations
line_length:
  warning: 140
  error: 200

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

identifier_name:
  excluded:
    - id
    - vm        # ViewModel shorthand
    - x
    - y
    - to
    - in

# Paths to skip
excluded:
  - .build
  - DerivedData
  - Wagonpills.xcodeproj
