name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "16.4"
  SCHEME: "Wagonpills"
  DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=18.5"

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build for Testing
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project Wagonpills.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -derivedDataPath "$GITHUB_WORKSPACE/.derived" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify build products exist
        run: |
          ls -la "$GITHUB_WORKSPACE/.derived/Build/Products/"
          find "$GITHUB_WORKSPACE/.derived/Build/Products/" -name "*.xctestrun"

      - name: Upload build products
        uses: actions/upload-artifact@v4
        with:
          name: build-products
          path: .derived/Build/Products
          retention-days: 1
          if-no-files-found: error

  test:
    name: Run Tests
    needs: [build]
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Download build products
        uses: actions/download-artifact@v4
        with:
          name: build-products
          path: .derived/Build/Products

      - name: Locate xctestrun
        id: xctestrun
        run: |
          XCTESTRUN=$(find .derived/Build/Products -name "*.xctestrun" | head -n 1)
          echo "Found: $XCTESTRUN"
          echo "path=$XCTESTRUN" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -xctestrun "${{ steps.xctestrun.outputs.path }}" \
            -destination "$DESTINATION" \
            -resultBundlePath test-results.xcresult \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xcresult
          retention-days: 7
